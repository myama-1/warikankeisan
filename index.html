<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>割り勘</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(145deg, #38b2f8 0%, #0e7fd4 100%);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            padding: 16px 14px;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 14px;
        }
        header .icon { font-size: 28px; line-height: 1; }
        header h1 {
            font-size: 19px;
            font-weight: 700;
            letter-spacing: 0.03em;
            margin-top: 4px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 12px;
            overflow: hidden;
        }

        /* ---- inputs ---- */
        .field-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #5ba3c9;
            margin-bottom: 5px;
        }

        textarea {
            width: 100%;
            height: 82px;
            padding: 10px 12px;
            border: 1.5px solid #c9e8f7;
            border-radius: 12px;
            resize: none;
            font-size: 15px;
            color: #333;
            background: #f5fbff;
            outline: none;
            transition: border-color 0.2s;
            line-height: 1.5;
        }
        textarea:focus { border-color: #38b2f8; background: #fff; }
        textarea::placeholder { color: #a8d4ee; }

        /* people picker */
        .people-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }
        .people-btn {
            border: 1.5px solid #c9e8f7;
            border-radius: 10px;
            background: #f5fbff;
            color: #2a85b8;
            font-size: 14px;
            font-weight: 600;
            padding: 7px 0;
            cursor: pointer;
            transition: all 0.15s;
        }
        .people-btn.active {
            background: linear-gradient(135deg, #38b2f8, #0e7fd4);
            border-color: transparent;
            color: white;
            box-shadow: 0 3px 10px rgba(14,127,212,0.35);
        }

        /* calculate button */
        .calc-btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #38b2f8 0%, #0e7fd4 100%);
            color: white;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.04em;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(14,127,212,0.4);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .calc-btn:active { transform: scale(0.97); box-shadow: 0 2px 8px rgba(102,126,234,0.3); }

        /* results */
        .results-row {
            display: flex;
            gap: 10px;
        }
        .result-box {
            flex: 1;
            border-radius: 14px;
            padding: 10px 12px;
            text-align: center;
        }
        .result-box .rb-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 3px;
        }
        .result-box .rb-value {
            font-size: 20px;
            font-weight: 800;
        }
        .box-total {
            background: #e8f5fe;
        }
        .box-total .rb-label { color: #5ba3c9; }
        .box-total .rb-value { color: #0e7fd4; }

        .box-per {
            background: linear-gradient(135deg, #38b2f8, #0e7fd4);
            box-shadow: 0 4px 14px rgba(102,126,234,0.35);
        }
        .box-per .rb-label { color: rgba(255,255,255,0.75); }
        .box-per .rb-value { color: white; }

        /* share button */
        .share-btn {
            width: 100%;
            padding: 11px;
            border: 1.5px solid #38b2f8;
            border-radius: 14px;
            background: white;
            color: #0e7fd4;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: none;
            transition: background 0.15s;
        }
        .share-btn.visible { display: block; }
        .share-btn:active { background: #e8f5fe; }

        /* expense list */
        .expense-list {
            flex: 1;
            overflow-y: auto;
            border-radius: 12px;
            background: #f5fbff;
            border: 1.5px solid #c9e8f7;
            padding: 10px 12px;
        }
        .expense-list-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #5ba3c9;
            margin-bottom: 8px;
        }
        .expense-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
            border-bottom: 1px solid #d0ebf7;
            font-size: 14px;
            color: #555;
        }
        .expense-item:last-child { border-bottom: none; }
        .expense-item .ei-num {
            width: 20px;
            height: 20px;
            border-radius: 6px;
            background: #c9e8f7;
            color: #0e7fd4;
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-right: 8px;
        }
        .expense-item .ei-amount {
            font-weight: 600;
            color: #333;
        }
        .expense-empty {
            font-size: 13px;
            color: #5ba3c9;
            text-align: center;
            padding: 10px 0;
        }

        /* toast */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: rgba(30,20,60,0.85);
            color: white;
            padding: 9px 22px;
            border-radius: 24px;
            font-size: 13px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.25s, transform 0.25s;
            pointer-events: none;
            backdrop-filter: blur(8px);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
    <header>
        <h1>割り勘計算</h1>
    </header>

    <div class="card">
        <!-- 支出入力 -->
        <div>
            <div class="field-label">支出金額（1行に1つ）</div>
            <textarea id="expenseInput" placeholder="1000&#10;500&#10;750&#10;1200"
                autocorrect="off" autocomplete="off" autocapitalize="off" spellcheck="false"
                inputmode="decimal"></textarea>
        </div>

        <!-- 人数 -->
        <div>
            <div class="field-label">人数</div>
            <div class="people-grid" id="peopleGrid">
                <button class="people-btn" data-val="1">1</button>
                <button class="people-btn active" data-val="2">2</button>
                <button class="people-btn" data-val="3">3</button>
                <button class="people-btn" data-val="4">4</button>
                <button class="people-btn" data-val="5">5</button>
                <button class="people-btn" data-val="6">6</button>
                <button class="people-btn" data-val="7">7</button>
                <button class="people-btn" data-val="8">8</button>
                <button class="people-btn" data-val="9">9</button>
                <button class="people-btn" data-val="10">10</button>
            </div>
        </div>

        <!-- 計算ボタン -->
        <button id="calculate" class="calc-btn">計算する</button>

        <!-- 結果 -->
        <div class="results-row">
            <div class="result-box box-total">
                <div class="rb-label">合計</div>
                <div class="rb-value"><span id="totalAmount">—</span><small style="font-size:12px;font-weight:600"> 円</small></div>
            </div>
            <div class="result-box box-per">
                <div class="rb-label">一人当たり</div>
                <div class="rb-value"><span id="perPersonAmount">—</span><small style="font-size:12px;font-weight:600;opacity:.8"> 円</small></div>
            </div>
        </div>

        <!-- 共有 -->
        <button id="shareBtn" class="share-btn">📤 結果を共有する</button>

        <!-- 内訳 -->
        <div class="expense-list" id="expenseList">
            <div class="expense-list-label">内訳</div>
            <div id="expenseItems">
                <div class="expense-empty">金額を入力して計算してください</div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            let selectedPeople = 2;
            let lastShareText = '';

            // 人数ボタン
            const peopleGrid = document.getElementById('peopleGrid');
            peopleGrid.addEventListener('click', function (e) {
                const btn = e.target.closest('.people-btn');
                if (!btn) return;
                document.querySelectorAll('.people-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedPeople = parseInt(btn.dataset.val);
            });

            document.getElementById('calculate').addEventListener('click', function () {
                const lines = document.getElementById('expenseInput').value.trim().split('\n');
                let total = 0;
                const validExpenses = [];

                for (const line of lines) {
                    const t = line.trim();
                    if (!t) continue;
                    const amount = parseFloat(t);
                    if (!isNaN(amount) && amount >= 0) {
                        total += amount;
                        validExpenses.push(amount);
                    }
                }

                const perPerson = validExpenses.length > 0 ? Math.ceil(total / selectedPeople) : 0;

                document.getElementById('totalAmount').textContent =
                    validExpenses.length > 0 ? total.toLocaleString() : '—';
                document.getElementById('perPersonAmount').textContent =
                    validExpenses.length > 0 ? perPerson.toLocaleString() : '—';

                const container = document.getElementById('expenseItems');
                container.innerHTML = '';
                if (validExpenses.length > 0) {
                    validExpenses.forEach((expense, i) => {
                        const item = document.createElement('div');
                        item.className = 'expense-item';
                        item.innerHTML = `
                            <div style="display:flex;align-items:center">
                                <div class="ei-num">${i + 1}</div>
                                <span>${expense.toLocaleString()}円</span>
                            </div>`;
                        container.appendChild(item);
                    });
                } else {
                    container.innerHTML = '<div class="expense-empty">有効な金額が入力されていません</div>';
                }

                const expenseLines = validExpenses.map((e, i) => `  ${i + 1}. ${e.toLocaleString()}円`).join('\n');
                lastShareText = [
                    `一人あたり：${perPerson.toLocaleString()}円`,
                    '──────────────',
                    `人数：${selectedPeople}人`,
                    '',
                    '内訳',
                    expenseLines || '  なし',
                    '',
                    `合計：${total.toLocaleString()}円`,
                ].join('\n');

                const shareBtn = document.getElementById('shareBtn');
                shareBtn.classList.toggle('visible', validExpenses.length > 0);
            });

            document.getElementById('shareBtn').addEventListener('click', async function () {
                if (navigator.share) {
                    try {
                        await navigator.share({ title: '割り勘計算結果', text: lastShareText });
                    } catch (_) {}
                } else {
                    try {
                        await navigator.clipboard.writeText(lastShareText);
                        showToast('クリップボードにコピーしました ✓');
                    } catch (_) {
                        showToast('コピーに失敗しました');
                    }
                }
            });

            function showToast(msg) {
                const t = document.getElementById('toast');
                t.textContent = msg;
                t.classList.add('show');
                setTimeout(() => t.classList.remove('show'), 2200);
            }
        });
    </script>
</body>
</html>
